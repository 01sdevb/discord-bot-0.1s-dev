name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Railway deployment via API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE_ID="081e83c9-2042-40c4-9041-ac99dda1ebeb"
          ENV_ID="93108fbe-edfa-4097-bc98-dfdb8da790de"

          echo "Triggering Railway deployment..."
          RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeployV2(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\") }\"}")

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q "errors"; then
            echo "Deploy API returned errors"
            exit 1
          fi

          echo "✅ Deploy triggered successfully on Railway"
